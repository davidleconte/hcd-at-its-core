name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  lint:
    name: Lint shell scripts and Python
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - name: Install ShellCheck
        run: sudo apt-get install -y shellcheck
      - name: ShellCheck
        run: shellcheck scripts/*.sh
      - name: Install ruff
        run: pip install ruff
      - name: Ruff (Python linting)
        run: ruff check scripts/*.py tests/*.py

  test:
    name: Pytest (dry-run tests)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip
      - name: Install test dependencies
        run: pip install pytest pytest-cov pyyaml cassandra-driver==3.29.2
      - name: Run tests with coverage
        run: pytest tests/ -v --cov=scripts --cov=tests --cov-report=term-missing --cov-report=html:coverage-report --junitxml=test-results.xml
      - name: Demo scorecard (dry-run validation of all 94 modules)
        run: bash scripts/demo-entropy.sh --score
      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage-report/
          retention-days: 14
      - name: Upload test results (JUnit XML)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: test-results.xml
          retention-days: 14

  docker-validate:
    name: Validate Docker configuration
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate docker-compose.yml syntax
        run: docker compose -f docker-compose.yml config --quiet
      - name: Validate secure-profile overlay merge
        run: docker compose -f docker-compose.yml -f docker-compose.secure.yml config --quiet
      - name: Lint Dockerfile with hadolint
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: Dockerfile
          failure-threshold: warning

  arena:
    name: Audit arena gate + manifest
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # the manifest reads git SHA / dirty / branch
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install tooling
        run: |
          sudo apt-get update && sudo apt-get install -y shellcheck gettext-base
          pip install -r requirements-dev.txt cassandra-driver==3.29.2
      - name: Deterministic gate (Oracle offline battery — BLOCKS on failure)
        run: bash audit_arena/bin/pre-merge-hook.sh
      - name: Arena audit (oracle + invariants + manifest + courtroom)
        run: make audit
      - name: Upload arena audit artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: arena-audit
          path: |
            audit_arena/courtroom.html
            audit_arena/state/manifest_r1.json
            audit_arena/state/invariants_r1.json
            audit_arena/state/oracle_r1.json
          retention-days: 14
