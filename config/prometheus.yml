global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - /etc/prometheus/alerts.yml

scrape_configs:
  - job_name: 'hcd-cluster'
    static_configs:
      - targets:
          - '172.28.0.2:9404'
          - '172.28.0.3:9404'
          - '172.28.0.4:9404'
          - '172.28.0.5:9404'
          - '172.28.0.6:9404'
          - '172.28.0.7:9404'
        labels:
          cluster: 'HCDCluster'
    relabel_configs:
      - source_labels: [__address__]
        regex: '172.28.0.2:.*'
        target_label: instance
        replacement: 'hcd-node1'
      - source_labels: [__address__]
        regex: '172.28.0.3:.*'
        target_label: instance
        replacement: 'hcd-node2'
      - source_labels: [__address__]
        regex: '172.28.0.4:.*'
        target_label: instance
        replacement: 'hcd-node3'
      - source_labels: [__address__]
        regex: '172.28.0.5:.*'
        target_label: instance
        replacement: 'hcd-node4'
      - source_labels: [__address__]
        regex: '172.28.0.6:.*'
        target_label: instance
        replacement: 'hcd-node5'
      - source_labels: [__address__]
        regex: '172.28.0.7:.*'
        target_label: instance
        replacement: 'hcd-node6'
