version: '3.8'

services:
  hcd-node1:
    build: .
    container_name: hcd-node1
    hostname: hcd-node1
    networks:
      hcd-cluster:
        ipv4_address: 172.28.0.2
    environment:
      - CASSANDRA_CLUSTER_NAME=${CASSANDRA_CLUSTER_NAME:-HCDCluster}
      - CASSANDRA_SEEDS=172.28.0.2
      - CASSANDRA_LISTEN_ADDRESS=172.28.0.2
      - CASSANDRA_BROADCAST_ADDRESS=172.28.0.2
      - CASSANDRA_RPC_ADDRESS=0.0.0.0
    volumes:
      - hcd-node1-data:/var/lib/cassandra
    ports:
      - "9042:9042"
    healthcheck:
      test: ["CMD-SHELL", "cqlsh -e 'describe cluster'"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  hcd-node2:
    build: .
    container_name: hcd-node2
    hostname: hcd-node2
    networks:
      hcd-cluster:
        ipv4_address: 172.28.0.3
    environment:
      - CASSANDRA_CLUSTER_NAME=${CASSANDRA_CLUSTER_NAME:-HCDCluster}
      - CASSANDRA_SEEDS=172.28.0.2
      - CASSANDRA_LISTEN_ADDRESS=172.28.0.3
      - CASSANDRA_BROADCAST_ADDRESS=172.28.0.3
      - CASSANDRA_RPC_ADDRESS=0.0.0.0
    volumes:
      - hcd-node2-data:/var/lib/cassandra
    depends_on:
      hcd-node1:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "cqlsh -e 'describe cluster'"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  hcd-node3:
    build: .
    container_name: hcd-node3
    hostname: hcd-node3
    networks:
      hcd-cluster:
        ipv4_address: 172.28.0.4
    environment:
      - CASSANDRA_CLUSTER_NAME=${CASSANDRA_CLUSTER_NAME:-HCDCluster}
      - CASSANDRA_SEEDS=172.28.0.2
      - CASSANDRA_LISTEN_ADDRESS=172.28.0.4
      - CASSANDRA_BROADCAST_ADDRESS=172.28.0.4
      - CASSANDRA_RPC_ADDRESS=0.0.0.0
    volumes:
      - hcd-node3-data:/var/lib/cassandra
    depends_on:
      hcd-node1:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "cqlsh -e 'describe cluster'"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

networks:
  hcd-cluster:
    driver: bridge
    ipam:
      config:
        - subnet: 172.28.0.0/16

volumes:
  hcd-node1-data:
  hcd-node2-data:
  hcd-node3-data:
