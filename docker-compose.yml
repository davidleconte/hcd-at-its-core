x-hcd-common: &hcd-common
  build: .
  restart: on-failure:3
  stop_grace_period: 120s
  cap_drop:
    - ALL
  cap_add:
    # NET_ADMIN is required for demo modules that simulate network failures:
    # - Module 17 (Zombie Node): docker network disconnect/connect
    # - Module 29 (Latency): tc qdisc for WAN latency injection
    # - Module 77 (DC Failover Under Attack): dc1 network partition
    - NET_ADMIN
  security_opt:
    - no-new-privileges:true
  ulimits:
    nofile:
      soft: 100000
      hard: 100000
    memlock:
      soft: -1
      hard: -1
  logging:
    driver: json-file
    options:
      max-size: "50m"
      max-file: "3"
  deploy:
    resources:
      limits:
        cpus: "0.50"
        memory: 1024M
  networks:
    hcd-cluster:

x-healthcheck: &hcd-healthcheck
  test: ["CMD-SHELL", "cqlsh -e 'SELECT release_version FROM system.local' || exit 1"]
  interval: 15s
  timeout: 10s
  retries: 15
  start_period: 180s

x-shared-env: &shared-env
  CASSANDRA_CLUSTER_NAME: ${CASSANDRA_CLUSTER_NAME:-HCDCluster}
  CASSANDRA_SEEDS: ${CASSANDRA_SEEDS:-172.28.0.2,172.28.0.5}
  CASSANDRA_RPC_ADDRESS: 0.0.0.0
  CASSANDRA_ENDPOINT_SNITCH: GossipingPropertyFileSnitch
  MAX_HEAP_SIZE: ${MAX_HEAP_SIZE:-512M}
  HEAP_NEWSIZE: ${HEAP_NEWSIZE:-100M}
  # JMX Prometheus exporter (active only when jmx_prometheus_javaagent.jar exists)
  JVM_EXTRA_OPTS: >-
    -javaagent:/opt/hcd/jmx_prometheus_javaagent.jar=9404:/opt/hcd/jmx-exporter.yml

services:
  # ─── Datacenter 1 ──────────────────────────────────────────────────────────────
  hcd-node1:
    <<: *hcd-common
    container_name: hcd-node1
    hostname: hcd-node1
    networks:
      hcd-cluster:
        ipv4_address: 172.28.0.2
    environment:
      <<: *shared-env
      CASSANDRA_LISTEN_ADDRESS: 172.28.0.2
      CASSANDRA_BROADCAST_ADDRESS: 172.28.0.2
      CASSANDRA_DC: dc1
      CASSANDRA_RACK: rack1
    volumes:
      - hcd-node1-data:/var/lib/cassandra
    ports:
      - "127.0.0.1:9042:9042"
    healthcheck:
      <<: *hcd-healthcheck

  hcd-node2:
    <<: *hcd-common
    container_name: hcd-node2
    hostname: hcd-node2
    networks:
      hcd-cluster:
        ipv4_address: 172.28.0.3
    environment:
      <<: *shared-env
      CASSANDRA_LISTEN_ADDRESS: 172.28.0.3
      CASSANDRA_BROADCAST_ADDRESS: 172.28.0.3
      CASSANDRA_DC: dc1
      CASSANDRA_RACK: rack2
    volumes:
      - hcd-node2-data:/var/lib/cassandra
    depends_on:
      hcd-node1:
        condition: service_healthy
    healthcheck:
      <<: *hcd-healthcheck

  hcd-node3:
    <<: *hcd-common
    container_name: hcd-node3
    hostname: hcd-node3
    networks:
      hcd-cluster:
        ipv4_address: 172.28.0.4
    environment:
      <<: *shared-env
      CASSANDRA_LISTEN_ADDRESS: 172.28.0.4
      CASSANDRA_BROADCAST_ADDRESS: 172.28.0.4
      CASSANDRA_DC: dc1
      CASSANDRA_RACK: rack3
    volumes:
      - hcd-node3-data:/var/lib/cassandra
    depends_on:
      hcd-node2:
        condition: service_healthy
    healthcheck:
      <<: *hcd-healthcheck

  # ─── Datacenter 2 ──────────────────────────────────────────────────────────────
  hcd-node4:
    <<: *hcd-common
    container_name: hcd-node4
    hostname: hcd-node4
    networks:
      hcd-cluster:
        ipv4_address: 172.28.0.5
    environment:
      <<: *shared-env
      CASSANDRA_LISTEN_ADDRESS: 172.28.0.5
      CASSANDRA_BROADCAST_ADDRESS: 172.28.0.5
      CASSANDRA_DC: dc2
      CASSANDRA_RACK: rack1
    volumes:
      - hcd-node4-data:/var/lib/cassandra
    depends_on:
      hcd-node3:
        condition: service_healthy
    healthcheck:
      <<: *hcd-healthcheck

  hcd-node5:
    <<: *hcd-common
    container_name: hcd-node5
    hostname: hcd-node5
    networks:
      hcd-cluster:
        ipv4_address: 172.28.0.6
    environment:
      <<: *shared-env
      CASSANDRA_LISTEN_ADDRESS: 172.28.0.6
      CASSANDRA_BROADCAST_ADDRESS: 172.28.0.6
      CASSANDRA_DC: dc2
      CASSANDRA_RACK: rack2
    volumes:
      - hcd-node5-data:/var/lib/cassandra
    depends_on:
      hcd-node4:
        condition: service_healthy
    healthcheck:
      <<: *hcd-healthcheck

  hcd-node6:
    <<: *hcd-common
    container_name: hcd-node6
    hostname: hcd-node6
    networks:
      hcd-cluster:
        ipv4_address: 172.28.0.7
    environment:
      <<: *shared-env
      CASSANDRA_LISTEN_ADDRESS: 172.28.0.7
      CASSANDRA_BROADCAST_ADDRESS: 172.28.0.7
      CASSANDRA_DC: dc2
      CASSANDRA_RACK: rack3
    volumes:
      - hcd-node6-data:/var/lib/cassandra
    depends_on:
      hcd-node5:
        condition: service_healthy
    healthcheck:
      <<: *hcd-healthcheck

  # ─── MinIO WORM Storage (optional: docker compose --profile ransomware up) ───
  minio:
    image: minio/minio:RELEASE.2024-03-30T09-41-56Z
    container_name: minio
    profiles: ["ransomware"]
    networks:
      hcd-cluster:
        ipv4_address: 172.28.0.10
    ports:
      - "127.0.0.1:9000:9000"
      - "127.0.0.1:9001:9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    command: server /data --console-address ":9001"
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD-SHELL", "mc ready local || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  # ─── Observability Stack (optional: docker compose --profile monitoring up) ───
  prometheus:
    image: prom/prometheus:v2.51.0
    container_name: prometheus
    profiles: ["monitoring"]
    networks:
      hcd-cluster:
        ipv4_address: 172.28.0.20
    ports:
      - "127.0.0.1:9090:9090"
    volumes:
      - ./config/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./config/alerts.yml:/etc/prometheus/alerts.yml:ro
      - prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.retention.time=7d'
    deploy:
      resources:
        limits:
          cpus: "0.25"
          memory: 512M
    restart: unless-stopped

  grafana:
    image: grafana/grafana:10.4.0
    container_name: grafana
    profiles: ["monitoring"]
    networks:
      hcd-cluster:
        ipv4_address: 172.28.0.21
    ports:
      - "127.0.0.1:3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: ${GF_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GF_ADMIN_PASSWORD:-admin}
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Viewer
    volumes:
      - ./config/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./config/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana-data:/var/lib/grafana
    depends_on:
      - prometheus
    deploy:
      resources:
        limits:
          cpus: "0.25"
          memory: 512M
    restart: unless-stopped

  # ─── Data API (optional: docker compose --profile api up) ───
  data-api:
    image: stargateio/data-api:v1.0.18
    container_name: data-api
    profiles: ["api"]
    networks:
      hcd-cluster:
        ipv4_address: 172.28.0.30
    ports:
      - "127.0.0.1:8181:8181"
    environment:
      STARGATE_JSONAPI_OPERATIONS_DATABASE_CONFIG_CASSANDRA_END_POINTS: 172.28.0.2
      STARGATE_JSONAPI_OPERATIONS_DATABASE_CONFIG_LOCAL_DATACENTER: dc1
      QUARKUS_HTTP_ACCESS_LOG_ENABLED: "false"
      QUARKUS_LOG_LEVEL: WARN
    deploy:
      resources:
        limits:
          cpus: "0.50"
          memory: 2G
    depends_on:
      hcd-node1:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8181/stargate/health || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 20
      start_period: 60s
    restart: unless-stopped

networks:
  hcd-cluster:
    driver: bridge
    ipam:
      config:
        - subnet: 172.28.0.0/24

volumes:
  hcd-node1-data:
  hcd-node2-data:
  hcd-node3-data:
  hcd-node4-data:
  hcd-node5-data:
  hcd-node6-data:
  minio-data:
  prometheus-data:
  grafana-data:
